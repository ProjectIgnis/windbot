name: Build EDOPro
on: [push, pull_request]
env:
  DEPLOY_REPO: ${{ secrets.DEPLOY_REPO }}
  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
  DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      output: ${{steps.create.outputs.id}}
    steps:
    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      id: create
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: true
        prerelease: false
  Desktop:
    runs-on: windows-2022
    needs: create_release
    if: false
    env:
      TRAVIS_OS_NAME: windows
    steps:
    - name: Set ARTIFACT env var
      shell: bash
      run: |
        echo "ARTIFACT=WindBotIgnite-Release-$(date +%Y%m%d)-${{ github.sha }}.zip" >> $GITHUB_ENV
    - uses: actions/checkout@v1
      with:
        fetch-depth: 1
        submodules: true
    - name: Install .NET 4.0
      shell: bash
      run: |
        ./ci/install-net-4.0.sh
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Build
      shell: bash
      run: |
        dotnet build WindBot.csproj --configuration=Release
    - name: Predeploy
      shell: bash
      run: |
        cd bin && mv Release WindBot
        7z a -tzip "$ARTIFACT" WindBot
        mv $ARTIFACT .. && cd ..
        mkdir -p assets
        cp $ARTIFACT assets
        cp Dialogs/default.json .
    - name: Deploy
      if: ${{ github.event_name == 'push' }}
      shell: bash
      run: ./ci/deploy.sh
    - name: Upload Release Assets
      if: startsWith(github.ref, 'refs/tags/')
      id: upload-release-assets
      uses: dwenegar/upload-release-assets@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        release_id: ${{ needs.create_release.outputs.output }}
        assets_path: assets

  Android:
    runs-on: windows-2022
    needs: create_release
    env:
      TRAVIS_OS_NAME: android
    steps:
    - name: Set ARTIFACT env var
      shell: bash
      run: |
        ls "C:\Program Files\Microsoft Visual Studio\2022"
        cp -r "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Xamarin" assets
    - name: Upload Build artifact
      uses: actions/upload-artifact@v7
      with:
        name: Desktop
        path: assets
    - uses: actions/checkout@v1


