name: Build EDOPro
on: [push, pull_request]
env:
  DEPLOY_REPO: ${{ secrets.DEPLOY_REPO }}
  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
  DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      output: ${{steps.create.outputs.id}}
    steps:
    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      id: create
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: true
        prerelease: false

  Build:
    runs-on: ubuntu-24.04
    env:
      NuGetPackageRoot: /home/runner/.nuget/packages
    needs: create_release
    steps:
    - name: Set ARTIFACT env var
      shell: bash
      run: |
        echo "ARTIFACT=WindBotIgnite-Release-$(date +%Y%m%d)-${{ github.sha }}.zip" >> $GITHUB_ENV
    - uses: actions/checkout@v1
      with:
        fetch-depth: 1
        submodules: true
    - uses: codebeltnet/install-mono@v1
    - name: Install mono xamarin
      run: |
        curl -L https://github.com/ProjectIgnis/windbot/releases/download/xamarin-assets/xamarin.android-oss_12.2.99.0_amd64.deb -o xamarin.android-oss_12.2.99.0_amd64.deb
        sudo apt update && sudo apt install -y ./xamarin.android-oss_12.2.99.0_amd64.deb
    - name: Install mono and SDK 24, SDK 25 and NDK 15
      shell: bash
      run: |
        ./ci/install-sdk-ndk.sh
    - name: Build Desktop
      shell: bash
      run: |
        msbuild -t:restore WindBot.sln
        ./ci/install-patched-mono-runtime.sh
        msbuild -m -p:Configuration=Release WindBot.sln -p:Posix=true -t:Windbot
    - name: Predeploy Desktop
      shell: bash
      run: |
        mkdir staging
        cd bin && mv Release WindBot
        7z a -tzip "$ARTIFACT" WindBot
        mv WindBot ../staging/
        mv $ARTIFACT .. && cd ..
        mkdir -p assets
        cp $ARTIFACT assets
    - name: Build Android
      shell: bash
      run: |
        msbuild -m -p:Configuration=Release WindBot.sln -p:Posix=true -t:libWindbot
    - name: Predeploy
      shell: bash
      run: |
        cd bin && mkdir -p WindBot
        cp -r ../COPYING ../LICENSE ../bots.json ../Decks/ ../Dialogs/ WindBot/
        7z a WindBotIgnite-Resources.7z WindBot && cd ..
        mkdir -p assets
        mv output/libWindbot.aar bin/WindBotIgnite-Resources.7z assets
        cp assets/libWindbot.aar staging/
    - name: Deploy
      if: ${{ github.event_name == 'push' }}
      shell: bash
      run: ./ci/deploy.sh
    - name: Upload Release Assets
      if: startsWith(github.ref, 'refs/tags/')
      id: upload-release-assets
      uses: dwenegar/upload-release-assets@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        release_id: ${{ needs.create_release.outputs.output }}
        assets_path: assets


